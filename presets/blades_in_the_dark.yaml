
name: Blades in the Dark
pool:
  - {Dice}d6
pipeline:
  - best = max rolled
  - sixes = filter rolled where face is_max
  - six_count = count sixes
outcomes:
  - Critical when six_count >= 2
  - Success when best = 6
  - Partial when best >= 4 and best <= 5
  - Failure when best <= 3
sweep:
  x:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
  xName: Dice
