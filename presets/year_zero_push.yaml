
id: year-zero-push
name: Year Zero - Push
pool:
  - {Dice}d6
reroll:
  - reroll when face > 1 and face < 6 tag as push
pipeline:
  - sixes = filter rolled where face = 6
  - result = count sixes
  - ones = filter rolled where face = 1
  - ones_count = count ones
outcomes:
  - Success when result >= 1
  - Failure when result = 0
  - Critical Failure when result = 0 and ones_count >= 0
  - Critical Success when result >= 3
sweep:
  x:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
  xName: Dice
