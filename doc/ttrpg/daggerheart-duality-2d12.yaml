
name: Daggerheart — Duality (2d12)
pool:
  - 1d12<hope>
  - 1d12<fear>
pipeline:
  - hope_face = filter rolled where tag = hope
  - fear_face = filter rolled where tag = fear
  - hope_value = max hope_face
  - fear_value = max fear_face
  - delta = hope_value - fear_value
  - total = sum rolled
  - total_mod = total + X
outcomes:
  - Critical Success when delta = 0
  - Success with Hope when delta > 0 and total_mod >= Y
  - Success with Fear when delta < 0 and total_mod >= Y
  - Failure with Hope when delta > 0 and total_mod < Y
  - Failure with Fear when delta < 0 and total_mod < Y
sweep:
  x:
    - -2
    - -1
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
  y:
    - 10
    - 15
    - 20
